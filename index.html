<!--
É uma boa prática colocar o nome do arquivo como index
Além disso o HTML utiliza tags para marcar as informações, por ser uma linguagem de marcação de texto, dessa forma o navegador consegue entender o arquivo HTML
-->
<!DOCTYPE html>
<html lang="en">

<!--
Head normalmente possui informaçoes mais importantes para o navegador em si, do que para o usuário
-->
<head>
    <meta charset="UTF-8">
    <!--
    Ajuste para que a tela não fique distorcida em diferentes resoluçoes como celulares, desktops, etc
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro site!</title>
</head>
<!--
diferente do head o body é onde iremos colocar as informaçoes que serão mostradas ao usuário
-->
<body>
    <!--
    Tag de headin title, possui 6 niveis de hierarquia, além disso podemos ver a abertura das tags nesse exemplo <exemplo> e o fechamento </exemplo> 
    -->
    <h1>Olá mundo!</h1>
    <h2>Exemplo de hierarquia</h2>
</body>
</html>
