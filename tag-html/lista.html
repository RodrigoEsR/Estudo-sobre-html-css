<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Exemplo de Listas</h1>

    <!--
    Exemplo de lista ordenada, usando a tag <ol>, é necessário utilizar a tag <li> dentro dela. Podemos definir também o tipo de ordenaçao com numeros, letras e os tipos disponiveis em <ol type=""
    -->
    <p>Lista ordenada</p>
    <ol type="A">
        <li>exemplo</li>
        <li>lista</li>
        <li>ordenada</li>
    </ol>
    
    <!--Exemplo de lista desordenada utilizando a tag <ul>, utiliza a tag <li> também, além de type. É possivel alinhar -->
        <p>Lista não ordenada</p>
        <ul type="square">
            <li>exemplo de lista desordenada</li>
            <li>ex2</li>
            <li>ex3</li>
            <ol>
                <li>aninhamento de Listas</li>
                <li>pode ser utilizado uma lista ordenada</li>
                <li>ou não ordenada, uma dentro da outra</li>
            </ol>
        </ul>

    <a href="index.html">Voltar</a>
</body>
</html>
