<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagens</title>
</head>
<body>
    <h1>Exemplo de imagens</h1>
        <!--Formatos de imagem usado na web
    JPEG - Geralmente usado para fotos de paisagem e pessoas, pois possui uma compressão e qualidade muito boa
    PNG - mais moderno, suporta transparência, ideal para logos
    SVG - Não perde a qualidade, idependentemente do tamanho da mesma
    WebP - deixa os arquivos mais leves, possui as vantagens do JPEG e suporta transparência

    Se a imagem for muito pesada, o site será menos performático, tendo um alto consumo de dados
    -->

    <!--
    Uso da tag imagem, possui o campo source (origem da imagem) e alternative text (descrição em texto da imagem, serve para a acessebilidade do site), além disso é muito importante para que o google entenda o que é a imagem e mostre ela nas pesquisas relacionadas
    -->
    <image src="../img/teste.jpeg" alt="Imagem falando que é um ambiente de teste"></image>
    <!--Exemplo quando a imagem nao carrega e o texto alternativo é usado-->
    <p>Exemplo quando a imagem não carrega e o texto alternativo é usado</p>
    <image src="img/semimagem" alt="Imagem falando que é um ambiente de teste"></image>
    <br>

    <a href="index.html">Voltar</a>
</body>
</html>
