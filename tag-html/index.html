<!--Tipo de documento na tag <DOCTYPE> e versão-->
<!DOCTYPE html>
<!--lang indica qual o idioma do site, por padrão vem sempre com en-->
<html lang="pt-br">
<head>
    <!--
    Declara o conjunto de caracteres utilizados no site/ padrão de codificação
    UTF-8 é o mais usado, e indicado
    -->
    <meta charset="UTF-8">
    <!--
    Configura quanto de espaço irá usar no navegador e escala de zoom
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--TItulo do nosso documento/site, aparece na aba do navegador-->
    <title>Inicio</title>
</head>
<body>
    <hr>
    <!--Possuimos 2 tipos de links, internos(ancoras) e externos
    Podemos usar atributos, como u_blank que abrem o link em uma nova página, sendo também uma boa prática.
    Exemplo de link externo e interno abaixo: -->
    <h2>Links internos</h2>
    <ol>
        <li><a href="titulos.html">Exemplo de titulos e hierarquia em html</a></li>
        <li><a href="paragrafoseformatacao.html">Exemplo de paragrafos e formataçao de texto</a></li>
        <li><a href="imagens.html">Exemplo de imagens</a></li>
        <li><a href="lista.html">Exemplo de uso de listas</a></li>
        <li><a href="tags.html">Tags mais usadas</a></li>

    </ol>
    
    <hr>
    <h2>Link externo</h2>
    
    <a href="http://www.exemplodelink.com.br" target="u_blank">exemplo de link</a>

    <!--Tags mais usadas em html-->
    
</body>
</html>
